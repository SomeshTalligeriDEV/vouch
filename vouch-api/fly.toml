app = "vouch-api"
primary_region = "iad"

[build]
  dockerfile = "docker/Dockerfile"

[env]
  ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["api"]

[[http_service.checks]]
  interval = "15s"
  timeout = "3s"
  method = "GET"
  path = "/health"

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  method = "GET"
  path = "/ready"

[processes]
  api = "/app/api"
  worker = "/app/worker"

# Worker machine — separate from the API. No public HTTP, but we still need
# it to restart on failure. Fly restarts the process automatically on non-zero exit.
[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
