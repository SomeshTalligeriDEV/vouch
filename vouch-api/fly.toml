app = "vouch-api"
primary_region = "iad"

[build]
  dockerfile = "docker/Dockerfile"

[env]
  ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["api"]

[[http_service.checks]]
  interval = "15s"
  timeout = "3s"
  method = "GET"
  path = "/health"

[processes]
  api = "/app/api"
  worker = "/app/worker"
