name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Go backend ──────────────────────────────────────────────────────────────
  api-test:
    name: api · test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vouch-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: vouch-api/go.sum
      - run: go vet ./...
      - run: go test ./... -race -timeout 60s
      - run: go build ./...

  # ── Next.js frontend ────────────────────────────────────────────────────────
  web-build:
    name: web · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vouch-web
    env:
      NEXT_PUBLIC_API_URL: https://vouch-api.fly.dev/api/v1
      NEXT_PUBLIC_GITHUB_CLIENT_ID: placeholder
      NEXT_PUBLIC_GITHUB_REDIRECT_URL: https://vouch.dev/login
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: vouch-web/package-lock.json
      - run: npm ci
      - run: npm run build

  # ── Deploy API to Fly.io (main only) ────────────────────────────────────────
  deploy-api:
    name: deploy · api → fly.io
    needs: api-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    concurrency: deploy-api
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only --config vouch-api/fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # ── Deploy Web to Vercel (main only) ────────────────────────────────────────
  deploy-web:
    name: deploy · web → vercel
    needs: web-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    concurrency: deploy-web
    defaults:
      run:
        working-directory: vouch-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: vouch-web/package-lock.json
      - run: npm ci
      - run: npm install -g vercel@latest
      - run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
